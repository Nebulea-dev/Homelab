services:
  minecraft:
    container_name: minecraft
    image: itzg/minecraft-server:java21
    ports:
      - 25565:25565
    user: "1000:100"
    environment:
      EULA: "TRUE"
      TYPE: 'MODRINTH'
      MODRINTH_MODPACK: 'cobbleverse'
      MEMORY: "16G"
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - homelab-net
